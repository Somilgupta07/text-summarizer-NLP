<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Summarizer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 800px;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #333;
      }

      p {
        text-align: center;
        color: #666;
      }

      textarea {
        width: 100%;
        min-height: 220px;
        padding: 15px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 10px;
        resize: vertical;
        margin-top: 15px;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #1d4ed8;
      }

      .result {
        margin-top: 30px;
        padding: 20px;
        background: #f8fafc;
        border-left: 5px solid #2563eb;
        border-radius: 8px;
      }

      .result h2 {
        margin-top: 0;
        color: #222;
      }

      .summary-box {
        color: #333;
        line-height: 1.6;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 Text Summarizer using T5-small</h1>
      <p>Enter a dialogue or long text and get a short summary.</p>

      <form action="/" method="post">
        <textarea name="dialogue" placeholder="Paste your dialogue here...">
{{ dialogue if dialogue else "" }}</textarea
        >
        <button type="submit">Generate Summary</button>
      </form>

      {% if summary %}
      <div class="result">
        <h2>Summary:</h2>
        <div class="summary-box">{{ summary }}</div>
      </div>
      {% endif %}
    </div>
  </body>
</html>
